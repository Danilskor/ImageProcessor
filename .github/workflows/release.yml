name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ImageProcessor-linux-x86_64.tar.gz
          - os: windows-latest
            artifact: ImageProcessor-windows-x86_64.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: pip

      # Linux: system libs required by OpenCV / Qt XCB platform plugin
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libgl1-mesa-glx libxcb-xinerama0 \
            libxcb-cursor0 libxkbcommon-x11-0

      - name: Install Python deps
        run: pip install -r requiremrnts.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller imageprocessor.spec --noconfirm

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf ImageProcessor-linux-x86_64.tar.gz -C dist ImageProcessor

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\ImageProcessor -DestinationPath ImageProcessor-windows-x86_64.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ImageProcessor-linux-x86_64.tar.gz
            ImageProcessor-windows-x86_64.zip
